<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ирины Андреевны ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #e4e4e7;
        }
        .title-font { font-family: 'Playfair Display', serif; }
        
        .photo-card {
            transition: all 0.4s ease;
            overflow: hidden;
            border-radius: 20px;
        }
        .photo-card:hover {
            transform: scale(1.04);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6);
        }
        .gallery-img {
            height: 260px;           /* Уменьшил высоту */
            object-fit: cover;
            width: 100%;
        }
        .heart { animation: pulse 2.5s infinite; }
        @keyframes pulse { 0%,100% {transform:scale(1);} 50% {transform:scale(1.2);} }
    </style>
</head>
<body class="bg-zinc-950">

    <!-- Hero Section -->
    <section class="min-h-screen flex items-center justify-center text-center px-6 bg-gradient-to-br from-zinc-900 via-zinc-950 to-black">
        <div class="max-w-4xl">
            <i class="fas fa-heart text-7xl text-red-500 heart mb-8"></i>
            <h1 class="title-font text-6xl md:text-7xl font-bold text-white mb-4">Ирина Андреевна</h1>
            <p class="text-3xl text-blue-300 mb-8">от Сунната с огромной любовью</p>
            <a href="#gallery" class="inline-block bg-white text-zinc-900 px-10 py-4 rounded-full text-xl font-medium hover:bg-blue-100 transition-all">
                Перейти к нашим моментам →
            </a>
        </div>
    </section>

    <!-- Gallery -->
    <section id="gallery" class="py-20 px-6 bg-zinc-950">
        <div class="max-w-7xl mx-auto">
            <h2 class="title-font text-5xl font-bold text-center mb-4 text-white">Наши моменты</h2>
            <p class="text-center text-zinc-400 mb-12">Каждое фото — частичка нашей любви</p>
            
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="photoGrid"></div>
        </div>
    </section>

    <script>
        const photos = [
            {src: "attachments/2024-09-06 22-07-29.JPG", cap: "Наша красивая встреча в метро с розой"},
            {src: "attachments/2024-05-17 22-26-20.HEIC", cap: "Твой взгляд, от которого замирает сердце"},
            {src: "attachments/2024-08-03 10-57-19.JPG", cap: "Ты на фоне Невы — невероятно красивая"},
            {src: "attachments/2024-06-25 00-15-47.HEIC", cap: "Мы вместе улыбаемся"},
            {src: "attachments/2023-08-14 21-12-23.HEIC", cap: "SUP-прогулка на закате"},
            {src: "attachments/2023-08-07 19-17-05.HEIC", cap: "Селфи с банданой"},
            {src: "attachments/2023-07-16 20-49-30.HEIC", cap: "Закат у воды"},
            {src: "attachments/2023-06-10 17-08-30.HEIC", cap: "На лавочке в парке"},
            {src: "attachments/2023-06-10 16-58-10.JPG", cap: "Ты в цветочном поле"},
            {src: "attachments/2023-04-17 18-03-30.HEIC", cap: "На набережной"},
            {src: "attachments/2023-04-17 18-02-47.HEIC", cap: "Когда мы смотрим друг на друга, мир перестает иметь значение ибо мы видим целых миров в глазах друг друга"},
            {src: "attachments/2024-06-08 20-35-14.JPG", cap: "Селфи в туалете, зай это важное фото, говорит оноо том что и в горе и в радости)"},
            {src: "attachments/2023-08-28 17-34-39.HEIC", cap: "В аэропорту"},
        ];

        function buildGallery() {
            const container = document.getElementById('photoGrid');
            photos.forEach(p => {
                const card = document.createElement('div');
                card.className = "photo-card bg-zinc-900";
                card.innerHTML = `
                    <img src="${p.src}" class="gallery-img" alt="Фото">
                    <div class="p-4">
                        <p class="text-sm text-zinc-300 leading-snug">${p.cap}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = buildGallery;
    </script>
</body>
</html>
